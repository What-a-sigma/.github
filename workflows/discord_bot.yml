name: Discord Organization Bot
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    types: [opened, closed]
  project_v2_item:
    types: [created, edited]

jobs:
  discord-notifier:
    runs-on: ubuntu-latest
    steps:
      - name: Send Notification
        uses: actions/github-script@v7
        with:
          script: |
            // --- SEKACJA DO EDYCJI: WPISZ ID UŻYTKOWNIKÓW ---
            const userMap = {
              "gruszczrob": "709310540396363777", 
              "agniechaa": "543585733173182474",
              "basiag278-lang": "922893867202789406",
              "jasgamer409": "571011845771624448",
              "magdankox": "750821180168208475",
              "mkosien": "474603733678817281",
              "olafdom": "416921019173961728"
              // Dodaj kolejnych: "login_github": "id_discord",
            };
            // -----------------------------------------------

            const webhookUrl = process.env.DISCORD_WEBHOOK;
            const event = context.eventName;
            const payload = context.payload;
            let message = "";

            const getMention = (ghUser) => userMap[ghUser] ? `<@${userMap[ghUser]}>` : `**${ghUser}**`;

            // 1. PUSH
            if (event === 'push') {
              message = `🚀 **Nowy push!**\nAutor: **${payload.pusher.name}**\nCommit: \`${payload.head_commit.message}\``;
            }

            // 2. PULL REQUESTS
            if (event === 'pull_request') {
              if (payload.action === 'opened') {
                message = `👀 **PR DO REWIZJI!** @everyone\nAutor: ${getMention(payload.pull_request.user.login)}\nLink: ${payload.pull_request.html_url}`;
              } else if (payload.action === 'closed' && payload.pull_request.merged) {
                message = `🎊 **MERGE!!!** Zadanie dowiezione! Kawa dla wszystkich! ☕\nRepo: **${context.repo.repo}**\nAutor sukcesu: ${getMention(payload.pull_request.user.login)}`;
              }
            }

            // 3. PROJEKTY (Nowe zadania i przypisania)
            if (event === 'project_v2_item') {
              // Sprawdzamy czy to nowy task czy edycja (np. przypisanie kogoś)
              const action = payload.action;
              const creator = payload.sender.login;
              
              // W przypadku projektów v2, informacja o assignee jest głębiej, 
              // ten uproszczony skrypt powiadomi o samej aktywności w projekcie.
              message = `📋 **Update w Projekcie!**\nAkcja: \`${action}\` wykonana przez ${getMention(creator)}`;
            }

            if (message) {
              await fetch(webhookUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: message })
              });
            }
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
