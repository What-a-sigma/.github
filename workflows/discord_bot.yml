name: Discord Project Notifications

on:
  project_v2_item:
    types: [created, edited, converted, reordered, archived, restored]

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send Project Update
        uses: actions/github-script@v7
        with:
          script: |

            const webhookUrl = process.env.DISCORD_WEBHOOK;
            if (!webhookUrl) {
              core.setFailed("Brak DISCORD_WEBHOOK");
              return;
            }

            const payload = context.payload;

            const embed = {
              title: "📋 Aktualizacja projektu organizacji",
              description: `
Akcja: \`${payload.action}\`
Wykonał: **${payload.sender.login}**
              `,
              color: 10181046
            };

            await fetch(webhookUrl, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ embeds: [embed] })
            });
